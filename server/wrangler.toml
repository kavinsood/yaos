name = "yaos"
main = "src/index.ts"
compatibility_date = "2026-03-02"

[[durable_objects.bindings]]
name = "YAOS_SYNC"
class_name = "VaultSyncServer"

[[durable_objects.bindings]]
name = "YAOS_CONFIG"
class_name = "ServerConfig"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["VaultSyncServer", "ServerConfig"]

[[r2_buckets]]
binding = "YAOS_BUCKET"
bucket_name = "yaos"

[observability.logs]
enabled = true

# ---------------------------------------------------------------------------
# Optional hardening variables
# ---------------------------------------------------------------------------
#
# Uncomment YAOS_DISABLE_LEGACY_WS_TOKEN once all plugin clients in your
# deployment have upgraded to a version that supports short-lived WebSocket
# tickets (plugin Release N or later, identified by the capabilities response
# containing "socketTicketAuth": true).
#
# When set to any non-empty string, WebSocket connections that still use the
# legacy ?token= query parameter are rejected with HTTP 401 before the vault
# Durable Object is woken.  Connections using short-lived tickets are
# unaffected.
#
# Upgrade path:
#   1. Deploy this server version (Release N).
#   2. Wait until Worker logs no longer show:
#        "legacy ?token= WebSocket auth for vault <id>"
#   3. Uncomment the line below and redeploy.
#   4. Keep the emergency fallback: if clients break, comment it out again.
#
# [vars]
# YAOS_DISABLE_LEGACY_WS_TOKEN = "true"

# ---------------------------------------------------------------------------
# Admin / debug route gating
# ---------------------------------------------------------------------------
#
# Uncomment YAOS_ENABLE_ADMIN_ROUTES to enable the destructive admin routes:
#   POST /__yaos/compact      — force an emergency journal compaction
#   POST /__yaos/cleanup-kv   — delete legacy KV storage keys after SQL migration
#
# When this variable is absent or empty these routes return HTTP 404, keeping
# them dark in production.  The read-only GET /__yaos/debug endpoint is always
# available regardless of this setting.
#
# [vars]
# YAOS_ENABLE_ADMIN_ROUTES = "true"
